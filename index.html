<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SON DAKİKA: CAN ÇALIŞIYOR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="news-container">
        <header class="header">
            <div class="live-indicator">
                <span class="dot"></span> CANLI
            </div>
            <div class="time" id="clock">00:00:00</div>
        </header>

        <main class="content">
            <h1 class="headline">ŞOK! CAN DERSE OTURDU</h1>
            
            <div class="image-wrapper">
                <div class="siren-bg"></div>
                <img src="can.png" alt="Can" class="profile-img" id="can-img">
            </div>

            <div class="action-area">
                <div class="progress-container">
                    <div class="progress-bar" id="focus-bar"></div>
                </div>
                <button id="boost-btn">🔥 ENERJİ YOLLA 🔥</button>
            </div>
        </main>

        <footer class="ticker-wrap">
            <div class="ticker">
                <span>🔴 FLAŞ: Telefonu sessize aldı!</span>
                <span>🔴 ŞOK: 10 dakikadır masadan kalkmadı!</span>
                <span>🔴 İNANILMAZ: Sayfa çevirme sesleri duyuldu!</span>
                <span>🔴 FLAŞ: Fosforlu kalem kapağı açıldı!</span>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
